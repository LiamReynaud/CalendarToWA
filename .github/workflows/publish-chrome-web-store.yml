# Publie Calendar to WhatsApp sur le Chrome Web Store.
# Secrets repo (Settings → Secrets → Actions) :
#   CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN, CWS_EXTENSION_ID
#
# Déclenchement :
#   - tag v* (ex. v1.9.9) → build + publish (soumission examen)
#   - workflow_dispatch → upload (brouillon) ou publish

name: Publish to Chrome Web Store

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      action:
        description: "upload (draft) or publish (submit for review)"
        required: true
        default: "upload"
        type: choice
        options:
          - upload
          - publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Build extension zip
        run: npm run package:chrome-store

      - name: Publish to Chrome Web Store
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          chmod +x scripts/publish-cws.sh
          ACTION="${{ github.event_name == 'workflow_dispatch' && inputs.action || 'publish' }}"
          scripts/publish-cws.sh "$ACTION" dist/extension.zip
