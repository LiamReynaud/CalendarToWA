<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar to WhatsApp</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Calendar to WhatsApp</h1>
      <p class="subtitle">
        Détecte les numéros dans vos réunions Google Calendar.
      </p>

      <label for="countryCode">Indicatif pays par défaut</label>
      <div class="field-row">
        <span class="prefix">+</span>
        <input
          type="text"
          id="countryCode"
          maxlength="3"
          pattern="[0-9]+"
          placeholder="33"
        />
      </div>
      <p class="hint">
        Utilisé pour les numéros locaux sans indicatif (ex.&nbsp;: 06 12 34 56
        78 → +33…).
      </p>

      <button type="button" id="saveBtn">Enregistrer</button>
      <p id="status" class="status" hidden></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
